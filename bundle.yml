---
### Bundle

name    : ecland-bundle
version : 0.0.0
cmake   : CMAKE_LINK_DEPENDS_NO_SHARED=ON
          ENABLE_OMP=ON
          ENABLE_SINGLE_PRECISION=OFF
          ECBUILD_RECORD_GIT_COMMIT_SHA1=OFF

projects :

    - ecbuild :
        git     : https://github.com/ecmwf/ecbuild
        version : develop
        bundle  : false

    - eccodes :
        git     : https://github.com/ecmwf/eccodes
        version : 2.44.0
        cmake   : >
            ENABLE_MEMFS=ON
            ENABLE_JPG=OFF
            ENABLE_PNG=OFF
            ENABLE_NETCDF=OFF
            ENABLE_JPG_LIBJASPER=OFF
            ENABLE_JPG_LIBOPENJPEG=OFF
            ENABLE_PRODUCT_GRIB=OFF

    - fiat :
        git     : https://github.com/ecmwf-ifs/fiat
        version : 2.0.0
        cmake   : ENABLE_DR_HOOK_NVTX=OFF


    - field_api :
        git     : https://github.com/ecmwf-ifs/field_api
        version : v0.3.9
        require : ecbuild

    - loki :
        git     : https://github.com/ecmwf-ifs/loki
        version : 0.3.2
        optional: true
        require : ecbuild
        cmake   : >
            LOKI_ENABLE_TESTS=OFF
            LOKI_ENABLE_NO_INSTALL=ON

    - ecland :
        dir     : $PWD

options :

    - with-single-precision :
        help  : Enable single precision build
        cmake : ENABLE_SINGLE_PRECISION=ON

    - with-static-linking :
        help  : Build static libraries by default
        cmake : BUILD_SHARED_LIBS=OFF

    - without-mpi :
        help  : Disable MPI
        cmake : ENABLE_MPI=OFF

    - without-omp :
        help  : Disable OpenMP
        cmake : ENABLE_OMP=OFF

    - with-acc :
        help  : Enable OpenACC support
        cmake : >
            ENABLE_ACC=ON
            FIELD_API_ENABLE_ACC=ON

    - with-loki :
        help  : Enable Loki source-to-source transformations for ecland physics
        cmake : >
            ENABLE_LOKI=ON
            LOKI_ENABLE_NO_INSTALL=OFF

    - without-loki-install :
        help  : Skip installation of Loki (Requires Loki to be on the PATH)
        cmake : >
            LOKI_ENABLE_NO_INSTALL=ON
            LOKI_ENABLE_CLAW=OFF

    - loki-mode :
        help  : Choose Loki transformation mode
        cmake : LOKI_MODE={{value}}
